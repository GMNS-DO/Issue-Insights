<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMNS Risk Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--bg2:#0f1218;--card:#131820;--border:#1e2733;
  --accent:#00d4aa;--accent2:#0099ff;--accent3:#ff6b35;
  --danger:#ff4d6d;--warn:#ffb347;--purple:#a855f7;
  --text:#e8edf5;--text2:#8a9ab5;--text3:#506080;
  --radius:12px;--radius-sm:8px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* ===== UPLOAD SCREEN ===== */
#upload-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.logo-wrap{text-align:center;margin-bottom:3rem}
.logo{font-family:'Syne',sans-serif;font-size:2.8rem;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px}
.logo-sub{font-family:'DM Mono',monospace;font-size:0.85rem;color:var(--text2);margin-top:0.5rem;letter-spacing:2px;text-transform:uppercase}
.drop-zone{width:100%;max-width:560px;border:2px dashed var(--border);border-radius:var(--radius);padding:4rem 2rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--card)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:#0f1a18}
.drop-zone-icon{font-size:3rem;margin-bottom:1rem;display:block}
.drop-zone h2{font-family:'Syne',sans-serif;font-size:1.3rem;margin-bottom:0.5rem}
.drop-zone p{color:var(--text2);font-size:0.9rem}
.drop-zone input[type="file"]{display:none}
.file-selected{font-family:'DM Mono',monospace;font-size:0.85rem;color:var(--accent);margin-top:1rem;word-break:break-all}

/* ===== LOADING OVERLAY ===== */
#loading-overlay{display:none;flex-direction:column;align-items:center;justify-content:center;position:fixed;inset:0;background:rgba(10,12,16,.92);z-index:1000;backdrop-filter:blur(8px)}
.spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:1.5rem}
@keyframes spin{to{transform:rotate(360deg)}
}
#loading-msg{font-family:'DM Mono',monospace;color:var(--text2);font-size:0.9rem}

/* ===== DASHBOARD ===== */
#dashboard{display:none}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:0.75rem}
.topbar-logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-center{font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--text2);text-align:center}
.topbar-center span{display:block}
.topbar-right{display:flex;align-items:center;gap:1rem}
.btn{font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;padding:0.5rem 1.25rem;border-radius:var(--radius-sm);border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#00e8bb}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--text2);color:var(--text)}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:0.5rem;padding:0.75rem 2rem;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;position:sticky;top:65px;z-index:90}
.filter-select{font-family:'DM Sans',sans-serif;font-size:0.8rem;padding:0.35rem 0.75rem;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;min-width:140px}
.filter-select:focus{outline:none;border-color:var(--accent)}
.filter-count{font-family:'DM Mono',monospace;font-size:0.75rem;background:var(--accent);color:#000;padding:0.15rem 0.5rem;border-radius:999px;font-weight:700}
.filter-tags{display:flex;gap:0.4rem;flex-wrap:wrap}
.filter-tag{display:inline-flex;align-items:center;gap:0.3rem;font-size:0.75rem;padding:0.2rem 0.6rem;background:var(--card);border:1px solid var(--border);border-radius:999px;color:var(--text2)}
.filter-tag button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.9rem;line-height:1;padding:0}
.filter-tag button:hover{color:var(--danger)}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(8,1fr);gap:1rem;padding:1.5rem 2rem}
@media(max-width:1200px){.kpi-row{grid-template-columns:repeat(4,1fr)}}
@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;position:relative;overflow:hidden;transition:transform .15s}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.blue::before{background:var(--accent2)}
.kpi-card.teal::before{background:var(--accent)}
.kpi-card.white::before{background:var(--text)}
.kpi-card.orange::before{background:var(--accent3)}
.kpi-card.red::before{background:var(--danger)}
.kpi-card.amber::before{background:var(--warn)}
.kpi-card.purple::before{background:var(--purple)}
.kpi-value{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;line-height:1;margin-bottom:0.3rem}
.kpi-label{font-size:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.kpi-sub{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--text3);margin-top:0.25rem}

/* CHART GRID */
.chart-section{padding:0 2rem 1.5rem}
.chart-row{display:grid;gap:1rem;margin-bottom:1rem}
.chart-row.r3{grid-template-columns:1fr 1fr}
.chart-row.r1{grid-template-columns:1fr 1fr 1fr}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;position:relative}
.chart-title{font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;margin-bottom:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.chart-wrap{position:relative;height:220px}
.chart-wrap canvas{width:100%!important;height:100%!important}

/* QUALITY ROW */
.quality-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;padding:0 2rem 1.5rem}
@media(max-width:768px){.quality-row{grid-template-columns:repeat(2,1fr)}}
.quality-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:border-color .15s,background .15s}
.quality-card:hover{border-color:var(--accent3);background:#1a1410}
.quality-card.has-issues{border-left:3px solid var(--danger)}
.quality-card.no-issues{border-left:3px solid var(--text3)}
.quality-icon{font-size:1.5rem}
.quality-info{flex:1}
.quality-count{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;line-height:1}
.quality-label{font-size:0.75rem;color:var(--text2)}

/* TABLE */
.table-section{padding:0 2rem 2rem}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-toolbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border);gap:1rem;flex-wrap:wrap}
.table-search{font-family:'DM Mono',monospace;font-size:0.8rem;padding:0.5rem 1rem;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);width:260px}
.table-search:focus{outline:none;border-color:var(--accent)}
.table-info{font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--text2)}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:0.82rem}
thead th{font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);padding:0.75rem 1rem;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:10}
thead th:hover{color:var(--text)}
thead th.sorted{color:var(--accent)}
thead th .sort-arrow{margin-left:0.3rem;opacity:0.5;font-size:0.65rem}
thead th.sorted .sort-arrow{opacity:1}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--bg2)}
tbody td{padding:0.65rem 1rem;vertical-align:middle}
td.ore-id{font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--text2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.title{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td .type-badge{display:inline-block;padding:0.15rem 0.5rem;border-radius:4px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.type-ore{background:rgba(0,153,255,.15);color:var(--accent2)}
.type-issue{background:rgba(0,212,170,.15);color:var(--accent)}
td .flag-badge{display:inline-block;padding:0.1rem 0.4rem;border-radius:3px;font-size:0.65rem;font-weight:700;text-transform:uppercase;margin-right:2px}
.flag-past{background:rgba(255,107,53,.2);color:var(--accent3)}
.flag-risk{background:rgba(255,77,109,.2);color:var(--danger)}
.flag-ongoing{background:rgba(255,179,71,.2);color:var(--warn)}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:0.4rem}
.status-open{background:var(--accent)}
.status-closed{background:var(--text3)}
.rating-amber{color:var(--warn)}
.rating-high{color:var(--danger)}
.table-pagination{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1.25rem;border-top:1px solid var(--border);gap:1rem}
.pagination-info{font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--text2)}
.pagination-controls{display:flex;gap:0.25rem}
.pg-btn{font-family:'DM Mono',monospace;font-size:0.75rem;padding:0.3rem 0.7rem;background:var(--bg);color:var(--text2);border:1px solid var(--border);border-radius:4px;cursor:pointer}
.pg-btn:hover{color:var(--text);border-color:var(--text2)}
.pg-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.pg-btn:disabled{opacity:0.3;cursor:not-allowed}

/* ERROR */
.error-msg{background:rgba(255,77,109,.1);border:1px solid var(--danger);color:var(--danger);padding:1rem 1.5rem;border-radius:var(--radius-sm);margin-top:1rem;font-family:'DM Mono',monospace;font-size:0.85rem}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
</style>
</head>
<body>

<!-- ===== UPLOAD SCREEN ===== -->
<div id="upload-screen">
  <div class="logo-wrap">
    <div class="logo">GMNS Risk Intelligence</div>
    <div class="logo-sub">ORE &amp; Issues Analytics Dashboard</div>
  </div>
  <div class="drop-zone" id="drop-zone">
    <span class="drop-zone-icon">📊</span>
    <h2>Drop your Excel file here</h2>
    <p>Supports .xlsx files containing ORE &amp; Issues sheets</p>
    <input type="file" id="file-input" accept=".xlsx,.xls">
  </div>
  <div id="file-name" class="file-selected"></div>
  <div id="error-display"></div>
</div>

<!-- ===== LOADING OVERLAY ===== -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-msg">Reading file...</div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">GMNS Risk Intelligence</span>
    </div>
    <div class="topbar-center" id="meta-info">
      <span id="meta-filename"></span>
      <span id="meta-rows"></span>
    </div>
    <div class="topbar-right">
      <span id="meta-timestamp" style="font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--text3)"></span>
      <button class="btn btn-ghost" onclick="resetDashboard()">Load New File</button>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <select class="filter-select" id="f-type" onchange="applyFilters()"><option value="">All Types</option></select>
    <select class="filter-select" id="f-theme" onchange="applyFilters()"><option value="">All Themes</option></select>
    <select class="filter-select" id="f-status" onchange="applyFilters()"><option value="">All Statuses</option></select>
    <select class="filter-select" id="f-rating" onchange="applyFilters()"><option value="">All Ratings</option></select>
    <select class="filter-select" id="f-owner" onchange="applyFilters()"><option value="">All Owners</option></select>
    <select class="filter-select" id="f-country" onchange="applyFilters()"><option value="">All Countries</option></select>
    <select class="filter-select" id="f-team" onchange="applyFilters()"><option value="">All Teams</option></select>
    <button class="btn btn-ghost" onclick="clearFilters()" style="font-size:0.75rem;padding:0.35rem 0.75rem">Clear</button>
    <span id="active-filter-count" class="filter-count" style="display:none">0</span>
    <div class="filter-tags" id="filter-tags"></div>
  </div>

  <!-- KPI ROW -->
  <div class="kpi-row" id="kpi-row"></div>

  <!-- CHARTS ROW 1 -->
  <div class="chart-section">
    <div class="chart-row r1" id="chart-row-1"></div>
  </div>

  <!-- CHARTS ROW 2 -->
  <div class="chart-section" style="padding-top:0">
    <div class="chart-row r3" id="chart-row-2"></div>
  </div>

  <!-- CHARTS ROW 3 -->
  <div class="chart-section" style="padding-top:0">
    <div class="chart-row r3" id="chart-row-3"></div>
  </div>

  <!-- QUALITY ROW -->
  <div class="quality-row" id="quality-row"></div>

  <!-- TABLE -->
  <div class="table-section">
    <div class="table-card">
      <div class="table-toolbar">
        <span style="font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700">Drilldown</span>
        <input type="text" class="table-search" id="table-search" placeholder="Search records..." oninput="applyTableSearch()">
        <div style="display:flex;align-items:center;gap:0.75rem">
          <span class="table-info" id="table-info"></span>
          <button class="btn btn-ghost" onclick="exportCSV()" style="font-size:0.75rem;padding:0.35rem 0.75rem">Export CSV</button>
        </div>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th data-col="ore_id" onclick="sortTable('ore_id')">ID <span class="sort-arrow">↕</span></th>
              <th data-col="title" onclick="sortTable('title')">Title <span class="sort-arrow">↕</span></th>
              <th data-col="record_type" onclick="sortTable('record_type')">Type <span class="sort-arrow">↕</span></th>
              <th data-col="owner" onclick="sortTable('owner')">Owner <span class="sort-arrow">↕</span></th>
              <th data-col="team_l2" onclick="sortTable('team_l2')">Team <span class="sort-arrow">↕</span></th>
              <th data-col="status" onclick="sortTable('status')">Status <span class="sort-arrow">↕</span></th>
              <th data-col="rating" onclick="sortTable('rating')">Rating <span class="sort-arrow">↕</span></th>
              <th data-col="gmns_theme" onclick="sortTable('gmns_theme')">GMNS Theme <span class="sort-arrow">↕</span></th>
              <th data-col="country" onclick="sortTable('country')">Country <span class="sort-arrow">↕</span></th>
              <th data-col="identification_date" onclick="sortTable('identification_date')">Identified <span class="sort-arrow">↕</span></th>
              <th data-col="flags" onclick="sortTable('flags')">Flags <span class="sort-arrow">↕</span></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div class="table-pagination">
        <span class="pagination-info" id="pagination-info"></span>
        <div class="pagination-controls" id="pagination-controls"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
let allRecords = [];
let filteredRecords = [];
let currentPage = 1;
const PAGE_SIZE = 25;
let sortCol = 'ore_id';
let sortDir = 'asc';
let chartInstances = {};
let activeFilterValues = {};

// ─── THEME MAP ───────────────────────────────────────────────────────────────
const THEME_MAP = {
  'Benefits': 'Benefit and Rewards',
  'Benefit and Rewards': 'Benefit and Rewards',
  'Customer Billing & Payments': 'Billing and Payments',
  'Billing and Payments': 'Billing and Payments',
  'Customer Management': 'Merchant Management',
  'Merchant Management': 'Merchant Management',
  'Financial Crimes': 'Financial Crimes',
  'Offers': 'Benefit and Rewards',
  'Partner/Vendor Management': 'Merchant Management',
  'Regulatory & Financial Reporting': 'Reporting',
  'Reporting': 'Reporting',
  'Unknown': 'Others',
  'Aml/Cft Operations / Sor': 'Financial Crimes',
  'Aml/Cft Operations/Sor': 'Financial Crimes',
  'Cdd/Kyc': 'Financial Crimes',
  'Colleague Management': 'Others',
  'Communication': 'Others',
  'Customer Account Servicing': 'Billing and Payments',
  'Customer Privacy': 'Others',
  'First Line Risk Management': 'Risk Management',
  'Incorrect Collection Practices': 'Others',
  'Policy and Program': 'Others',
  'Pricing': 'Financial Crimes',
  'Regulatory Requests and Reporting': 'Reporting',
  'Rewards': 'Benefit and Rewards',
  'Risk Assessment': 'Risk Management',
  'Risk Management': 'Risk Management',
  'Screening': 'Financial Crimes',
  'Statement & Settlement Issues': 'Billing and Payments',
  'Statement Credit': 'Billing and Payments',
  'Transactions': 'Billing and Payments',
};

function mapTheme(val) {
  if (!val || (typeof val === 'string' && val.trim() === '')) return { theme: null, status: 'empty' };
  const norm = val.trim().toLowerCase().replace(/\s+/g, ' ');
  const mapped = THEME_MAP[norm] || THEME_MAP[val.trim()] || 'Others';
  const status = mapped === 'Others' && !THEME_MAP[norm] && !THEME_MAP[val.trim()] ? 'fallback' : 'mapped';
  return { theme: mapped, status };
}

// ─── COLUMN MAPS ──────────────────────────────────────────────────────────────
const ORE_COL_MAP = {
  'ORE ID': 'ore_id',
  'ORE Title': 'title',
  'ORE Description': 'description',
  'OS Name Level 1': 'team_l1',
  'OS Name Level 2': 'team_l2',
  'OS Name Level 3': 'team_l3',
  'ORE Status (Derived)': 'status',
  'ORE Owner': 'owner',
  'Accountable Executive': 'accountable_exec',
  'Business Unit Control Manager': 'bucm',
  'ORE Theme': 'source_theme',
  'ORE Sub Theme': 'sub_theme',
  'ORE Type Level 1': 'type_l1',
  'ORE Type Level 2': 'type_l2',
  'ORE Country Occurred': 'country',
  'Impacted Legal Entities': 'legal_entities',
  'ORE Rating': 'rating',
  'Is there an Ongoing Impact?': 'ongoing_impact',
  'ORE Identification Date': 'identification_date',
  'ORE Occurrence Start Date': 'occurrence_date',
  'ORE Capture Due Date': 'capture_due_date',
  'Total Actual Financial Amount (USD)': 'financial_amount_usd',
  'Total Loss Outcome (USD)': 'loss_usd',
  'ORE Cancelation': 'cancellation',
  'Past Due': 'past_due',
  'Risk Pillar': 'risk_pillar',
  'Risk Level 2': 'risk_level2',
  'Data': 'data_flag',
  'Privacy': 'privacy_flag',
};

const ISSUE_COL_MAP = {
  'Issue ID': 'issue_id',
  'Issue Title': 'title',
  'Issue Description': 'description',
  'Issue Owner': 'owner',
  'Issue Owner Business Unit (L1)': 'team_l1',
  'Issue Owner Business Unit (L2)': 'team_l2',
  'Issue Owner Business Unit (L3)': 'team_l3',
  'Issue Accountable Executive': 'accountable_exec',
  'Business Unit Control Manager (BUCM)': 'bucm',
  'Issue Status': 'status',
  'Issue Status Rating': 'rating',
  'Issue Theme': 'source_theme',
  'Issue Sub Theme': 'sub_theme',
  'Impacted Countries': 'country',
  'Impacted Legal Entities': 'legal_entities',
  'Issue Identification Date': 'identification_date',
  'Issue Sustainability Current Target Date': 'capture_due_date',
  'Root Cause Theme': 'root_cause_theme',
  'Root Cause Sub Theme': 'root_cause_sub_theme',
  'Is this a Repeat Issue?': 'is_repeat',
  'Will Regulator Track This Issue?': 'regulator_tracking',
  'Past Due': 'past_due',
  'Failed Validation': 'failed_validation',
  'Long Dated': 'long_dated',
  'New Red/Amber': 'new_red_amber',
  'Risk Level 2': 'risk_level2',
  'Data': 'data_flag',
  'Privacy': 'privacy_flag',
};

// ─── UTILITIES ────────────────────────────────────────────────────────────────
function normStr(v) { return v == null ? '' : String(v).trim(); }
function isYes(v) { const s = normStr(v).toLowerCase(); return s === 'yes' || s === 'y' || s === 'true'; }
function toDate(v) {
  if (!v) return null;
  if (v instanceof Date) return v;
  const s = normStr(v);
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return new Date(s);
  const d = new Date(s);
  return isNaN(d) ? null : d;
}
function parseNum(v) {
  if (v == null || v === '') return null;
  const n = parseFloat(String(v).replace(/[$,]/g, ''));
  return isNaN(n) ? null : n;
}
function splitList(v) {
  const s = normStr(v);
  if (!s) return [];
  return s.split(/[,;]/).map(x => x.trim()).filter(x => x);
}
function safe(v) { return v == null ? '' : v; }

// ─── FILE READ ────────────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

function handleFile(file) {
  if (!file.name.match(/\.xlsx?$/i)) {
    showError('Please upload a .xlsx or .xls file.');
    return;
  }
  document.getElementById('file-name').textContent = file.name;
  showLoading();
  setMsg('Parsing Excel file...');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array', cellDates: true });
      processWorkbook(wb, file.name);
    } catch(err) {
      hideLoading();
      showError('Failed to read file: ' + err.message);
    }
  };
  reader.onerror = () => { hideLoading(); showError('File read error.'); };
  reader.readAsArrayBuffer(file);
}

function showLoading() { document.getElementById('loading-overlay').style.display = 'flex'; }
function hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }
function setMsg(m) { document.getElementById('loading-msg').textContent = m; }
function showError(m) { document.getElementById('error-display').innerHTML = '<div class="error-msg">'+m+'</div>'; }

// ─── PROCESS WORKBOOK ─────────────────────────────────────────────────────────
function processWorkbook(wb, filename) {
  setMsg('Detecting sheets...');
  const sheetNames = wb.SheetNames;

  const oreSheetName = sheetNames.find(n => n === 'ORE' || n.toUpperCase().includes('ORE'));
  const issueSheetName = sheetNames.find(n => n === 'Issues' || n.toUpperCase().includes('Issue'));

  if (!oreSheetName && !issueSheetName) {
    hideLoading();
    showError('Could not find "ORE" or "Issues" sheets in this file. Found sheets: ' + sheetNames.join(', '));
    return;
  }

  const oreRaw = oreSheetName ? XLSX.utils.sheet_to_json(wb.Sheets[oreSheetName], { defval: '' }) : [];
  const issueRaw = issueSheetName ? XLSX.utils.sheet_to_json(wb.Sheets[issueSheetName], { defval: '' }) : [];

  setMsg('Transforming ORE records...');
  const oreRecords = oreRaw.map(row => transformORE(row));

  setMsg('Transforming Issue records...');
  const issueRecords = issueRaw.map(row => transformISSUE(row));

  setMsg('Merging and computing derived fields...');
  allRecords = [...oreRecords, ...issueRecords];

  setMsg('Computing KPIs and chart data...');
  const kpis = computeKPIs(allRecords);
  const charts = computeCharts(allRecords);
  const quality = computeQuality(allRecords);

  renderDashboard(kpis, charts, quality, filename);
}

// ─── ORE TRANSFORM ────────────────────────────────────────────────────────────
function transformORE(row) {
  const mapped = {};
  const rawKeys = Object.keys(row);
  for (const [src, tgt] of Object.entries(ORE_COL_MAP)) {
    const key = rawKeys.find(k => normStr(k) === src) || rawKeys.find(k => normStr(k).toLowerCase() === src.toLowerCase());
    mapped[tgt] = key ? row[key] : '';
  }
  mapped.ore_id = mapped.ore_id || mapped.issue_id || normStr(mapped.ore_id || '');
  if (!mapped.ore_id) mapped.ore_id = 'ORE-' + Math.random().toString(36).slice(2,8);
  mapped.record_type = 'ORE';
  mapped.financial_amount_usd = parseNum(mapped.financial_amount_usd);
  mapped.loss_usd = parseNum(mapped.loss_usd);
  applyDerived(mapped);
  const { theme, status: ms } = mapTheme(mapped.source_theme);
  mapped.gmns_theme = theme || '';
  mapped.mapping_status = ms;
  return mapped;
}

// ─── ISSUE TRANSFORM ──────────────────────────────────────────────────────────
function transformISSUE(row) {
  const mapped = {};
  const rawKeys = Object.keys(row);
  for (const [src, tgt] of Object.entries(ISSUE_COL_MAP)) {
    const key = rawKeys.find(k => normStr(k) === src) || rawKeys.find(k => normStr(k).toLowerCase() === src.toLowerCase());
    mapped[tgt] = key ? row[key] : '';
  }
  mapped.ore_id = mapped.issue_id || normStr(mapped.ore_id || '');
  if (!mapped.ore_id) mapped.ore_id = 'ISS-' + Math.random().toString(36).slice(2,8);
  mapped.record_type = 'ISSUE';
  applyDerived(mapped);
  const { theme, status: ms } = mapTheme(mapped.source_theme);
  mapped.gmns_theme = theme || '';
  mapped.mapping_status = ms;
  return mapped;
}

// ─── DERIVED FIELDS ──────────────────────────────────────────────────────────
function applyDerived(r) {
  r.is_open = /open/i.test(normStr(r.status));
  r.is_high_risk = /high|red/i.test(normStr(r.rating));
  r.ongoing_impact_flag = r.record_type === 'ORE' ? isYes(r.ongoing_impact) : false;

  const pastDue = normStr(r.past_due).toLowerCase();
  r.is_past_due = pastDue === 'yes' || pastDue === 'y' || pastDue === 'true';
  if (!r.is_past_due && r.capture_due_date) {
    const due = toDate(r.capture_due_date);
    if (due && due < new Date() && r.is_open) r.is_past_due = true;
  }

  r.country_list = splitList(r.country);
  r.country_count = r.country_list.length;
  r.legal_entity_list = splitList(r.legal_entities);
  r.legal_entity_count = r.legal_entity_list.length;
  r.geography_status = normStr(r.country) !== '' ? 'confirmed' : 'unknown';
  r.missing_owner = normStr(r.owner) === '';
  r.missing_theme = normStr(r.source_theme) === '';
  r.missing_country = normStr(r.country) === '';
  r.missing_root_cause = r.record_type === 'ISSUE' ? normStr(r.root_cause_theme) === '' : false;
  r.data_flagged = isYes(r.data_flag);
  r.privacy_flagged = isYes(r.privacy_flag);
}

// ─── KPI ─────────────────────────────────────────────────────────────────────
function computeKPIs(records) {
  const ores = records.filter(r => r.record_type === 'ORE');
  const issues = records.filter(r => r.record_type === 'ISSUE');

  const allCountries = new Set();
  const allLEs = new Set();
  records.forEach(r => {
    r.country_list.forEach(c => { if (c) allCountries.add(c); });
    r.legal_entity_list.forEach(le => { if (le) allLEs.add(le); });
  });

  const mapped = records.filter(r => r.mapping_status === 'mapped').length;
  const total = records.length || 1;

  return {
    total_ores: ores.length,
    total_issues: issues.length,
    total_records: total,
    open_items: records.filter(r => r.is_open).length,
    past_due_items: records.filter(r => r.is_past_due).length,
    high_risk_items: records.filter(r => r.is_high_risk).length,
    ongoing_impact_ores: ores.filter(r => r.ongoing_impact_flag).length,
    distinct_countries: allCountries.size,
    distinct_legal_entities: allLEs.size,
    mapping_coverage_pct: Math.round(mapped / total * 1000) / 10,
    data_flagged: records.filter(r => r.data_flagged).length,
    privacy_flagged: records.filter(r => r.privacy_flagged).length,
    missing_owner_count: records.filter(r => r.missing_owner).length,
    missing_theme_count: records.filter(r => r.missing_theme).length,
    missing_country_count: records.filter(r => r.missing_country).length,
  };
}

// ─── CHART DATA ───────────────────────────────────────────────────────────────
function computeCharts(records) {
  const ores = records.filter(r => r.record_type === 'ORE');
  const issues = records.filter(r => r.record_type === 'ISSUE');

  function countByField(recs, field, limit) {
    const m = {};
    recs.forEach(r => {
      const v = normStr(r[field] || '(No ' + field + ')');
      m[v] = (m[v] || 0) + 1;
    });
    return Object.entries(m).sort((a,b) => b[1]-a[1]).slice(0,limit||Infinity);
  }

  function countByTheme(recs) {
    const m = {};
    recs.forEach(r => { const t = r.gmns_theme || 'Others'; m[t] = (m[t]||0)+1; });
    return Object.entries(m).sort((a,b) => b[1]-a[1]);
  }

  function topCountries(recs, limit) {
    const m = {};
    recs.forEach(r => r.country_list.forEach(c => { if (c) m[c] = (m[c]||0)+1; }));
    return Object.entries(m).sort((a,b) => b[1]-a[1]).slice(0,limit||20);
  }

  function monthlyTrend(recs) {
    const m = {};
    recs.forEach(r => {
      if (!r.identification_date) return;
      const d = toDate(r.identification_date);
      if (!d) return;
      const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      m[key] = (m[key]||0) + 1;
    });
    return Object.entries(m).sort((a,b) => a[0].localeCompare(b[0]));
  }

  return {
    items_by_gmns_theme: countByTheme(records),
    status_distribution: countByField(records, 'status'),
    items_by_record_type: [
      ['ORE', ores.length], ['ISSUE', issues.length]
    ],
    issues_by_owner: countByField(issues, 'owner', 15),
    ores_by_team: countByField(ores, 'team_l2', 15),
    items_by_country: topCountries(records, 20),
    monthly_trend: monthlyTrend(records),
  };
}

// ─── QUALITY ──────────────────────────────────────────────────────────────────
function computeQuality(records) {
  return {
    missing_owner: records.filter(r => r.missing_owner).length,
    missing_theme: records.filter(r => r.missing_theme).length,
    missing_country: records.filter(r => r.missing_country).length,
    missing_root_cause: records.filter(r => r.missing_root_cause).length,
  };
}

function destroyChart(id) {

function makeChart(ctx, type, data, options) {
  const defaults = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: {
      backgroundColor: '#131820', titleColor: '#e8edf5', bodyColor: '#8a9ab5',

  if (type === 'bar' || type === 'line') {
    defaults.scales = {
      x: { grid: { color: '#1e2733' }, ticks: { color: '#8a9ab5', font: { family: 'DM Mono', size: 10 } } },
      y: { grid: { color: '#1e2733' }, ticks: { color: '#8a9ab5', font: { family: 'DM Mono', size: 10 } } }
    };
  }
  if (type === 'doughnut') {
    defaults.plugins.legend = { display: true, position: 'bottom', labels: {
      color: '#8a9ab5', font: { family: 'DM Sans', size: 11 }, padding: 12, usePointStyle: true, pointStyleWidth: 8
    }};
  }
  const merged = { ...defaults, ...options };
  return new Chart(ctx, { type, data, ...merged });
}

// ─── CHART CLICK ─────────────────────────────────────────────────────────────
function chartClick(e, chartId, data, field) {
  const el = e.chart ?? e.target;
  const active = el.getElementsByClassName ? [] : (el.getActive ? el.getActive() : []);
  if (!active.length) return;
  const idx = active[0].index;
  if (idx < 0 || idx >= data.length) return;
  const val = data[idx][0];
  if (val === '(No ' + field + ')' || val === '(blank)' || val === '(blank ' + field + ')') return;
  const selectEl = document.getElementById('f-' + fieldMapToFilterId(field));
  if (!selectEl) return;
  // Check if already filtered
  if (selectEl.value === val) {
    selectEl.value = '';
  } else {
    selectEl.value = val;
  }
  applyFilters();
}

  gmns_theme: 'theme', status: 'status', record_type: 'type',
  owner: 'owner', country: 'country', team_l2: 'team',
};

// ─── FILTER LOGIC ────────────────────────────────────────────────────────────
function populateFilters() {
  const fields = {
    'f-type': { key: 'record_type', records: allRecords },
    'f-theme': { key: 'gmns_theme', records: allRecords },
    'f-status': { key: 'status', records: allRecords },
    'f-rating': { key: 'rating', records: allRecords },
    'f-owner': { key: 'owner', records: allRecords },
    'f-country': { key: 'country', records: allRecords, top20: true },
    'f-team': { key: 'team_l2', records: allRecords },
  };

  for (const [selId, cfg] of Object.entries(fields)) {
    const select = document.getElementById(selId);
    if (!select) continue;
    const counts = {};
    cfg.records.forEach(r => {
      const v = normStr(r[cfg.key]) || '(blank)';
      counts[v] = (counts[v] || 0) + 1;
    });
    let entries = Object.entries(counts).sort((a,b) => b[1]-a[1]);
    if (cfg.top20) entries = entries.slice(0, 20);
    select.innerHTML = '<option value="">All</option>' + entries.map(e =>
      `<option value="${escHtml(e[0])}">${escHtml(e[0])} (${e[1]})</option>`
    ).join('');
  }
}

function getActiveFilters() {
  return {
    type: document.getElementById('f-type')?.value || '',
    theme: document.getElementById('f-theme')?.value || '',
    status: document.getElementById('f-status')?.value || '',
    rating: document.getElementById('f-rating')?.value || '',
    owner: document.getElementById('f-owner')?.value || '',
    country: document.getElementById('f-country')?.value || '',
    team: document.getElementById('f-team')?.value || '',
  };
}

function applyFilters() {
  const f = getActiveFilters();
  const activeCount = Object.values(f).filter(v => v !== '').length;

  const countEl = document.getElementById('active-filter-count');
  if (activeCount > 0) {
    countEl.style.display = 'inline';
    countEl.textContent = activeCount;
  } else {
    countEl.style.display = 'none';
  }

  filteredRecords = allRecords.filter(r => {
    if (f.type && r.record_type !== f.type) return false;
    if (f.theme && (r.gmns_theme || '') !== f.theme) return false;
    if (f.status && (normStr(r.status) !== f.status)) return false;
    if (f.rating && (normStr(r.rating) !== f.rating)) return false;
    if (f.owner && (normStr(r.owner) !== f.owner)) return false;
    if (f.country && (normStr(r.country) !== f.country)) return false;
    if (f.team && (normStr(r.team_l2) !== f.team)) return false;
    return true;
  });

  currentPage = 1;
  renderFilterTags(f);
  renderTable();
  updatePaginationInfo();
  updateKPIsFromFiltered();
}

function renderFilterTags(f) {
  const tagsEl = document.getElementById('filter-tags');
  const labels = { type: 'Type', theme: 'Theme', status: 'Status', rating: 'Rating', owner: 'Owner', country: 'Country', team: 'Team' };
  const filterIds = { type: 'f-type', theme: 'f-theme', status: 'f-status', rating: 'f-rating', owner: 'f-owner', country: 'f-country', team: 'f-team' };
  const pairs = Object.entries(f).filter(([k,v]) => v !== '');
  tagsEl.innerHTML = pairs.map(([k,v]) =>
    `<span class="filter-tag">${labels[k]}: ${escHtml(v)} <button onclick="removeFilter('${filterIds[k]}')">×</button></span>`
  ).join('');
}

function removeFilter(selId) {
  const el = document.getElementById(selId);
  if (el) el.value = '';
  applyFilters();
}

function clearFilters() {
  ['f-type','f-theme','f-status','f-rating','f-owner','f-country','f-team'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  applyFilters();
}

function updateKPIsFromFiltered() {
  const kpis = computeKPIs(filteredRecords);
  renderKPIs(kpis);
}

// ─── TABLE ───────────────────────────────────────────────────────────────────
function renderTable() {
  const search = normStr(document.getElementById('table-search')?.value || '').toLowerCase();
  let rows = search ? filteredRecords.filter(r =>
    normStr(r.ore_id).toLowerCase().includes(search) ||
    normStr(r.title).toLowerCase().includes(search) ||
    normStr(r.owner).toLowerCase().includes(search) ||
    normStr(r.gmns_theme).toLowerCase().includes(search) ||
    normStr(r.country).toLowerCase().includes(search)
  ) : filteredRecords;

  rows = sortRows(rows);

  const totalPages = Math.max(1, Math.ceil(rows.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageRows = rows.slice(start, start + PAGE_SIZE);

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = pageRows.map(r => {
    const typeCls = r.record_type === 'ORE' ? 'type-ore' : 'type-issue';
    const flags = [];
    if (r.is_past_due) flags.push('<span class="flag-badge flag-past">Past Due</span>');
    if (r.is_high_risk) flags.push('<span class="flag-badge flag-risk">High Risk</span>');
    if (r.ongoing_impact_flag) flags.push('<span class="flag-badge flag-ongoing">Ongoing</span>');
    const dot = r.is_open ? 'status-open' : 'status-closed';
    const ratingCls = /high|red/i.test(normStr(r.rating)) ? 'rating-high' : /medium|amber/i.test(normStr(r.rating)) ? 'rating-amber' : '';
    const idisp = escHtml(r.ore_id || '');
    return `<tr>
      <td class="ore-id" title="${idisp}">${idisp}</td>
      <td class="title" title="${escHtml(r.title||'')}">${escHtml(r.title||'')}</td>
      <td><span class="type-badge ${typeCls}">${r.record_type}</span></td>
      <td>${escHtml(r.owner||'')}</td>
      <td>${escHtml(r.team_l2||'')}</td>
      <td><span class="${dot}"></span>${escHtml(r.status||'')}</td>
      <td class="${ratingCls}">${escHtml(r.rating||'')}</td>
      <td>${escHtml(r.gmns_theme||'')}</td>
      <td>${escHtml(r.country||'')}</td>
      <td>${escHtml(r.identification_date ? String(r.identification_date).slice(0,10) : '')}</td>
      <td>${flags.join('')}</td>
    </tr>`;
  }).join('');

  document.getElementById('table-info').textContent = `${rows.length} records`;
  renderPaginationControls(rows.length, totalPages);
}

function sortRows(rows) {
  return [...rows].sort((a,b) => {
    let av = a[sortCol] ?? '';
    let bv = b[sortCol] ?? '';
    if (sortCol === 'identification_date') {
      av = toDate(av)?.getTime() || 0;
      bv = toDate(bv)?.getTime() || 0;
    } else {
      av = normStr(av).toLowerCase();
      bv = normStr(bv).toLowerCase();
    }
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });
}

function sortTable(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = 'asc';
  }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  const th = document.querySelector(`th[data-col="${col}"]`);
  if (th) th.classList.add('sorted');
  renderTable();
}

function applyTableSearch() {
  currentPage = 1;
  renderTable();
}

function renderPaginationControls(totalRows, totalPages) {
  const controls = document.getElementById('pagination-controls');
  const info = document.getElementById('pagination-info');
  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end = Math.min(currentPage * PAGE_SIZE, totalRows);
  info.textContent = totalRows > 0 ? `${start}-${end} of ${totalRows}` : '0 records';

  let html = '';
  html += `<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  const pages = getPageList(currentPage, totalPages);
  pages.forEach(p => {
    if (p === '...') {
      html += `<span style="color:var(--text3);padding:0 0.3rem;font-size:0.75rem">…</span>`;
    } else {
      html += `<button class="pg-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    }
  });
  html += `<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  controls.innerHTML = html;
}

function getPageList(cur, total) {
  if (total <= 7) return Array.from({length:total},(_,i)=>i+1);
  const pages = [];
  if (cur <= 4) { for(let i=1;i<=5;i++) pages.push(i); pages.push('...'); pages.push(total); }
  else if (cur >= total-3) { pages.push(1); pages.push('...'); for(let i=total-4;i<=total;i++) pages.push(i); }
  else { pages.push(1); pages.push('...'); pages.push(cur-1,cur,cur+1); pages.push('...'); pages.push(total); }
  return pages;
}

function goPage(p) {
  const totalPages = Math.max(1, Math.ceil(filteredRecords.length / PAGE_SIZE));
  currentPage = Math.max(1, Math.min(p, totalPages));
  renderTable();
  updatePaginationInfo();
}

function updatePaginationInfo() {}

// ─── CSV EXPORT ───────────────────────────────────────────────────────────────
function exportCSV() {
  const search = normStr(document.getElementById('table-search')?.value || '').toLowerCase();
  let rows = search ? filteredRecords.filter(r =>
    normStr(r.ore_id).toLowerCase().includes(search) ||
    normStr(r.title).toLowerCase().includes(search)
  ) : filteredRecords;

  const fields = ['ore_id','title','record_type','owner','team_l2','status','rating',
    'gmns_theme','source_theme','country','identification_date','is_open','is_past_due',
    'is_high_risk','ongoing_impact_flag','financial_amount_usd','mapping_status',
    'missing_owner','missing_theme','missing_country'];
  const header = fields.join(',');
  const csvRows = rows.map(r =>
    fields.map(f => {
      const v = r[f];
      if (v == null) return '';
      const s = String(v);
      return s.includes(',') || s.includes('"') || s.includes('\n')
        ? '"' + s.replace(/"/g,'""') + '"' : s;
    }).join(',')
  );
  const blob = new Blob([header+'\n'+csvRows.join('\n')], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gmns_export_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ─── RESET ───────────────────────────────────────────────────────────────────
function resetDashboard() {
  allRecords = []; filteredRecords = []; currentPage = 1;
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('upload-screen').style.display = 'flex';
  document.getElementById('file-input').value = '';
  document.getElementById('file-name').textContent = '';
  document.getElementById('error-display').innerHTML = '';
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
